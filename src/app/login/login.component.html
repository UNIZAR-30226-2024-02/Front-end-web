<div class="login-container">
  <form [formGroup]="loginForm">  <!-- Agrega el formulario al elemento form y enlázalo con el FormGroup -->
    <div class="form-group">
      <label for="email">Email:</label>
      <input type="email" id="email" formControlName="email" class="form-control">
      <!-- Agregar mensajes de error aquí -->
    </div>
    <div class="form-group">
      <label for="password">Contraseña:</label>
      <input type="password" id="password" formControlName="password" class="form-control">
      <!-- Agregar mensajes de error aquí -->
    </div>
    <!-- Botón de iniciar sesión con routerLink -->
    <button class="btn btn-primary" (click)="onLogin()">Iniciar sesión</button>
  </form>
</div>
